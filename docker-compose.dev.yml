services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: eircare_db
      MYSQL_USER: eircare_user
      MYSQL_PASSWORD: password123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./eircare-backend
    ports:
      - "8080:8080"
    env_file:
      - path: key.env
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/eircare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: eircare_user
      SPRING_DATASOURCE_PASSWORD: password123
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_dev_data:
