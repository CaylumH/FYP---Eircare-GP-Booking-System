services:
  mysql:
    image: mysql:8.4
    container_name: eircare-mysql
    networks:
      - eircare-net
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: >
      --innodb-buffer-pool-size=64M
      --innodb-log-buffer-size=8M
      --max-connections=50
      --performance-schema=OFF
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    restart: always

  backend:
    image: caylumh/eircare-backend:latest
    container_name: eircare-backend
    networks:
      - eircare-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  frontend:
    image: caylumh/eircare-frontend:latest
    container_name: eircare-frontend
    networks:
      - eircare-net
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: eircare-nginx
    networks:
      - eircare-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: always

networks:
  eircare-net:
    driver: bridge

volumes:
  mysql_data:
